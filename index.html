<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵犀AI</title>
<style>
body { background:#0b0b0b;color:#fff;font-family:sans-serif;margin:0;padding:0;}
.container { max-width:800px;margin:50px auto;padding:20px;}
textarea { width:100%; height:100px; padding:10px; border-radius:8px; font-size:16px;}
button { margin-top:10px; padding:10px 20px; background:#00f0ff; border:none; border-radius:6px; cursor:pointer; font-size:16px;}
#result { margin-top:20px; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="container">
<h1>灵犀AI</h1>
<p>输入你的问题，点击生成AI内容</p>
<textarea id="input" placeholder="请输入内容..."></textarea>
<button onclick="generate()">生成AI内容</button>
<div id="result"></div>
</div>

<script>
async function generate() {
    const input = document.getElementById("input").value;
    if(!input){ alert("请输入内容"); return; }

    try{
        const res = await fetch("http://你的腾讯云公网IP:3001/api/ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: input })
        });
        const data = await res.json();
        document.getElementById("result").innerText = data.result;
    } catch(err){
        document.getElementById("result").innerText = "请求失败：" + err;
    }
}
</script>
</body>
</html>
